<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pra Cima - Acesso ao sistema</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pitanga: "#4b1b5f",
            pitangaDark: "#3a124b",
            mutedText: "#77717d"
          },
          boxShadow: {
            login: "0 18px 55px rgba(31, 17, 34, 0.18)"
          }
        }
      }
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .page-bg {
      min-height: 100vh;
      background-image:
        linear-gradient(90deg, rgba(0,0,0,.08), rgba(255,255,255,.03)),
        url("fundo.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      position: relative;
    }

    .page-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.05) 58%, rgba(255,255,255,0.10) 100%);
      pointer-events: none;
    }

    .login-card {
      width: min(88vw, 405px);
      min-height: auto;
      border-radius: 18px;
      background: rgba(255, 255, 255);
      box-shadow: 0 20px 50px rgba(43, 23, 46, .18);
      backdrop-filter: blur(4px);
    }

    .brand-text {
      font-weight: 900;
      letter-spacing: .03em;
      line-height: .86;
      color: #4b1b5f;
    }

    .brand-sub {
      font-size: 9px;
      letter-spacing: .08em;
      font-weight: 800;
      color: #4b1b5f;
    }

    .logo-word {
      font-size: 21px;
      transform: scaleX(.98);
    }

    .field {
      height: 39px;
      border: 1.2px solid rgba(55, 48, 70, .68);
      background: #eaf2ff;
      border-radius: 9px;
      padding: 0 14px;
      color: #15131a;
      font-size: 13px;
      outline: none;
      transition: all .2s ease;
    }

    .field:focus {
      border-color: #4b1b5f;
      box-shadow: 0 0 0 3px rgba(75,27,95,.14);
      background: #eef5ff;
    }

    .btn-enter {
      height: 38px;
      border-radius: 8px;
      background: #4b1b5f;
      color: white;
      font-weight: 700;
      transition: .2s ease;
    }

    .btn-enter:hover {
      background: #3a124b;
      transform: translateY(-1px);
    }

    .btn-enter:active {
      transform: translateY(0);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
      z-index: 40;
    }

    .modal-overlay.active {
      pointer-events: auto;
    }

    .register-card {
      width: min(88vw, 500px);
      border-radius: 18px;
      background: rgba(255, 255, 255);
      box-shadow: 0 20px 50px rgba(43, 23, 46, .18);
      backdrop-filter: blur(4px);
      padding: 40px 36px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
    }

    .form-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    @media (max-width: 900px) {
      .page-bg {
        background-position: 33% center;
      }

      .login-card {
        width: min(92vw, 405px);
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .page-bg {
        align-items: center;
        justify-content: center;
        padding: 28px 16px;
        background-position: 38% center;
      }

      .page-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,.28);
      }

      .login-card {
        position: relative;
        z-index: 2;
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <a href="../index.html" class="fixed top-6 left-6 z-[60] inline-flex items-center gap-2 bg-white/90 hover:bg-white text-pitanga font-semibold text-sm px-4 py-2 rounded-full shadow-login backdrop-blur transition">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Voltar para o site
  </a>

  <main class="page-bg flex items-center justify-end px-[8.2vw] py-10">
    <section class="login-card relative z-[1] px-9 pt-[30px] pb-7">
      <div class="flex flex-col items-center">
        <div class="text-center select-none mb-6">
          <img src="mariapitanga.png" alt="Maria Pitanga Açaí & Gelatos" class="mx-auto w-[160px] h-auto">
        </div>
        
        <h1 class="text-pitanga text-[20px] font-bold leading-none mb-8">
          Pra Cima - Acesso ao sistema
        </h1>
      </div>

      <form id="loginForm" class="space-y-[18px]">
        <div>
          <label for="email" class="block text-pitanga text-[14px] font-bold mb-[7px]">
            E-mail
          </label>
          <input
            id="email"
            name="email"
            type="email"
            value=""
            autocomplete="email"
            class="field w-full"
          />
        </div>

        <div>
          <label for="password" class="block text-pitanga text-[14px] font-bold mb-[7px]">
            Senha
          </label>
          <div class="relative">
            <input
              id="password"
              name="password"
              type="password"
              value=""
              autocomplete="current-password"
              class="field w-full pr-10"
            />
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-pitanga hover:text-pitangaDark" onclick="togglePasswordVisibility()">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-enter w-full mt-[2px]">
          Entrar
        </button>
      </form>

      <div class="flex items-center justify-between mt-[20px] mb-[20px]">
        <a href="#" class="text-pitanga text-[14px] font-medium hover:underline">
          Política de Privacidade
        </a>
        <a href="#" class="text-pitanga text-[14px] font-medium hover:underline">
          Esqueceu a senha?
        </a>
      </div>

      <div class="text-center mt-[20px]">
        <p class="text-mutedText text-[14px]">
          Não tem uma conta? <a href="#" class="text-pitanga font-medium hover:underline" onclick="openRegisterModal(event)">Cadastre-se aqui</a>
        </p>
      </div>
    </section>
  </main>

  <!-- Modal de Cadastro -->
  <div class="modal-overlay" id="modalOverlay"></div>
  
  <div class="register-card" id="registerCard" style="opacity: 0; transform: translate(-50%, -50%) scale(0.8);">
    <h1 class="text-pitanga text-[20px] font-bold leading-none mb-8 flex items-center justify-center gap-3">
      <img src="foguete.webp" alt="" class="w-8 h-auto">
      <span>Pra Cima - Criar conta</span>
      <img src="foguete.webp" alt="" class="w-8 h-auto">
    </h1>

    <form id="registerForm" class="space-y-[18px]">
      <div>
        <label for="register-name" class="block text-pitanga text-[14px] font-bold mb-[7px]">
          Nome
        </label>
        <input
          id="register-name"
          name="name"
          type="text"
          class="field w-full"
          required
        />
      </div>

      <div class="form-group">
        <div>
          <label for="register-email" class="block text-pitanga text-[14px] font-bold mb-[7px]">
            Email
          </label>
          <input
            id="register-email"
            name="email"
            type="email"
            class="field w-full"
            required
          />
        </div>
        <div>
          <label for="register-phone" class="block text-pitanga text-[14px] font-bold mb-[7px]">
            Celular
          </label>
          <input
            id="register-phone"
            name="phone"
            type="tel"
            class="field w-full"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <div>
          <label for="register-cpf" class="block text-pitanga text-[14px] font-bold mb-[7px]">
            CPF
          </label>
          <input
            id="register-cpf"
            name="cpf"
            type="text"
            class="field w-full"
            required
          />
        </div>
        <div>
          <label for="register-company" class="block text-pitanga text-[14px] font-bold mb-[7px]">
            Código da empresa
          </label>
          <input
            id="register-company"
            name="company"
            type="text"
            class="field w-full"
            required
          />
        </div>
      </div>

      <div>
        <label for="register-password" class="block text-pitanga text-[14px] font-bold mb-[7px]">
          Senha
        </label>
        <div class="relative">
          <input
            id="register-password"
            name="password"
            type="password"
            class="field w-full pr-10"
            required
          />
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-pitanga hover:text-pitangaDark" onclick="toggleRegisterPasswordVisibility()">
            <svg id="registerEyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-enter w-full mt-[18px]">
        Cadastrar
      </button>
    </form>

    <div class="text-center mt-[20px]">
      <p class="text-mutedText text-[14px]">
        Já tem uma conta? <a href="#" class="text-pitanga font-medium hover:underline" onclick="closeRegisterModal(event)">Entrar</a>
      </p>
    </div>
  </div>

  <script>
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    function toggleRegisterPasswordVisibility() {
      const passwordInput = document.getElementById('register-password');
      const eyeIcon = document.getElementById('registerEyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    function showRegisterModal() {
      const overlay = document.getElementById('modalOverlay');
      const registerCard = document.getElementById('registerCard');
      const loginCard = document.querySelector('.login-card');

      overlay.classList.add('active');

      // Animação do overlay
      gsap.to(overlay, {
        backgroundColor: 'rgba(0, 0, 0, 0.5)',
        duration: 0.3,
        ease: 'power2.out'
      });

      // Animação do login card (sai pela esquerda)
      gsap.to(loginCard, {
        opacity: 0,
        x: -100,
        duration: 0.4,
        ease: 'power2.inOut'
      });

      // Animação do cadastro card (entra)
      gsap.to(registerCard, {
        opacity: 1,
        x: 0,
        scale: 1,
        duration: 0.5,
        ease: 'back.out',
        delay: 0.1
      });
    }

    function openRegisterModal(event) {
      event.preventDefault();
      showRegisterModal();
    }

    function closeRegisterModal(event) {
      event.preventDefault();
      const overlay = document.getElementById('modalOverlay');
      const registerCard = document.getElementById('registerCard');
      const loginCard = document.querySelector('.login-card');

      // Animação do overlay
      gsap.to(overlay, {
        backgroundColor: 'rgba(0, 0, 0, 0)',
        duration: 0.3,
        ease: 'power2.out'
      });

      // Animação do cadastro card (sai)
      gsap.to(registerCard, {
        opacity: 0,
        scale: 0.8,
        duration: 0.4,
        ease: 'back.in'
      });

      // Animação do login card (volta)
      gsap.to(loginCard, {
        opacity: 1,
        x: 0,
        duration: 0.5,
        ease: 'power2.inOut',
        delay: 0.1,
        onComplete: () => {
          overlay.classList.remove('active');
        }
      });
    }

    // Fechar modal ao clicar no overlay
    document.getElementById('modalOverlay').addEventListener('click', (event) => {
      if (event.target.id === 'modalOverlay') {
        closeRegisterModal(event);
      }
    });

    const loginForm = document.getElementById("loginForm");
    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Preencha o e-mail e a senha para continuar.");
        return;
      }

      alert("Login enviado com sucesso!");
    });

    const registerForm = document.getElementById("registerForm");
    registerForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const name = document.getElementById("register-name").value.trim();
      const email = document.getElementById("register-email").value.trim();
      const phone = document.getElementById("register-phone").value.trim();
      const cpf = document.getElementById("register-cpf").value.trim();
      const company = document.getElementById("register-company").value.trim();
      const password = document.getElementById("register-password").value.trim();

      if (!name || !email || !phone || !cpf || !company || !password) {
        alert("Preencha todos os campos para continuar.");
        return;
      }

      alert("Cadastro enviado com sucesso!");
      closeRegisterModal(new MouseEvent('click'));
    });

    // Abre o modal de cadastro automaticamente ao chegar com #cadastro na URL
    if (window.location.hash === '#cadastro') {
      showRegisterModal();
    }
  </script>
</body>
</html>
